services:
  dream-farm-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8088}:80"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
